<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,follow">
  <meta name="theme-color" content="#050505">
  <title>404 — Eidon Aetho</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <style>
    :root { --ink:#111; --paper:#f8f1df; --lime:#c8f35a; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; background: #050505;
      display: grid; place-items: center; padding: 24px;
      font-family: Inter, "Segoe UI", system-ui, sans-serif; color: var(--ink);
    }
    .card {
      max-width: 520px; width: 100%; background: var(--paper);
      border: 4px solid var(--ink); box-shadow: 9px 9px 0 var(--ink); padding: 36px 30px;
    }
    .code {
      display: inline-block; background: var(--lime); border: 4px solid var(--ink);
      box-shadow: 5px 5px 0 var(--ink); padding: 6px 16px; margin-bottom: 22px;
      font-family: "Courier New", monospace; font-weight: 700; letter-spacing: 2px;
    }
    h1 { margin: 0 0 12px; font-size: clamp(1.6rem, 1.2rem + 2vw, 2.3rem); line-height: 1.1; text-transform: uppercase; }
    p { margin: 0 0 26px; line-height: 1.55; color: #464646; }
    a.button {
      display: inline-block; background: var(--lime); border: 4px solid var(--ink);
      box-shadow: 5px 5px 0 var(--ink); padding: 12px 20px; color: var(--ink);
      font-weight: 700; text-decoration: none; text-transform: uppercase;
      transition: transform 120ms ease, box-shadow 120ms ease;
    }
    a.button:hover, a.button:focus-visible { transform: translate(-2px,-2px); box-shadow: 7px 7px 0 var(--ink); }
    @media (prefers-reduced-motion: reduce) { a.button { transition: none; } }
  </style>
</head>
<body>
  <main class="card">
    <span class="code">404</span>
    <h1>Esta ruta no existe</h1>
    <p>La página que buscas no está publicada, o la dirección cambió.</p>
    <a class="button" href="/Web-Eidon-Aetho/">Volver al inicio →</a>
  </main>
</body>
</html>
