name: Temporary OG-inspired navigation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-navigation:
    if: github.head_ref == 'design/og-inspired-navigation'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Apply limited visual integration
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          def read(path: str) -> str:
              return Path(path).read_text(encoding="utf-8")

          def write(path: str, content: str) -> None:
              Path(path).write_text(content, encoding="utf-8", newline="\n")

          def replace_once(source: str, old: str, new: str, label: str) -> str:
              count = source.count(old)
              if count != 1:
                  raise RuntimeError(f"{label}: se esperaba una coincidencia y se encontraron {count}")
              return source.replace(old, new, 1)

          index = read("index.html")
          index = replace_once(
              index,
              '  <link rel="stylesheet" href="featured-projects.css?v=3fee97cab936">\n',
              '  <link rel="stylesheet" href="featured-projects.css?v=3fee97cab936">\n  <link rel="stylesheet" href="identity-navigation.css?v=TEMP">\n',
              "hoja de identidad",
          )
          index = replace_once(
              index,
              '  <div class="site-shell">\n    <main id="contenido">',
              '''  <div class="site-shell">
    <header class="site-brand">
      <a class="site-brand__link" href="#inicio" aria-label="Ir al inicio de Eidon Aetho">
        <span class="site-brand__code" aria-hidden="true">&lt;/&gt;</span>
        <span class="site-brand__name">EIDON AETHO</span>
      </a>
    </header>

    <main id="contenido">''',
              "cabecera de marca",
          )
          index = replace_once(
              index,
              '''            <!-- STATIC-SOCIALS:END -->
          </div>
        </div>''',
              '''            <!-- STATIC-SOCIALS:END -->
          </div>

          <nav class="hero-nav" aria-label="Secciones principales">
            <a href="#proyectos">Projects</a>
            <span class="hero-nav__separator" aria-hidden="true">·</span>
            <a href="#enlaces">Links</a>
            <span class="hero-nav__separator" aria-hidden="true">·</span>
            <a href="#notas">Notes</a>
          </nav>
        </div>''',
              "navegación del hero",
          )
          write("index.html", index)

          prerender = read("scripts/prerender.py")
          prerender = replace_once(
              prerender,
              '    "styles.css",\n    "background-stickers.css",',
              '    "styles.css",\n    "identity-navigation.css",\n    "background-stickers.css",',
              "versionado de navegación",
          )
          write("scripts/prerender.py", prerender)

          validator = read("scripts/validate_static.py")
          validator = replace_once(
              validator,
              '    require(\'aria-labelledby="featured-projects-title"\' in source, "El panel necesita etiqueta estática.")\n',
              '''    require('aria-labelledby="featured-projects-title"' in source, "El panel necesita etiqueta estática.")
    require(source.count('class="site-brand"') == 1, "Debe existir una única cabecera de marca.")
    require(source.count('class="hero-nav"') == 1, "Debe existir una única navegación principal.")
    nav_blocks = re.findall(r'<nav class="hero-nav"[^>]*>(.*?)</nav>', source, flags=re.DOTALL)
    require(len(nav_blocks) == 1, "No se pudo aislar la navegación principal.")
    nav_targets = re.findall(r'<a href="(#[a-zA-Z0-9_-]+)">', nav_blocks[0])
    require(nav_targets == ["#proyectos", "#enlaces", "#notas"], "Enlaces principales inesperados.")
    for target in nav_targets:
        require(f'id="{target[1:]}"' in source, f"Destino interno inexistente: {target}")
''',
              "validación de navegación",
          )
          validator = replace_once(
              validator,
              '    print("Semántica, contadores, HTML, JSON-LD, CSP, sitemap, robots y 404 válidos.")',
              '    print("Navegación, semántica, contadores, HTML, JSON-LD, CSP, sitemap, robots y 404 válidos.")',
              "mensaje del validador",
          )
          write("scripts/validate_static.py", validator)
          PY

      - name: Regenerate static HTML
        run: python scripts/prerender.py

      - name: Validate result
        run: |
          python -m py_compile scripts/prerender.py
          python -m py_compile scripts/validate_static.py
          python scripts/prerender.py --check
          python scripts/validate_static.py
          node --check app.js
          node --check ads.js

      - name: Commit validated changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html identity-navigation.css scripts/prerender.py scripts/validate_static.py
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "design: integrar navegación inspirada en la tarjeta social"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
