name: Temporary PR refactor

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-refactor:
    if: github.head_ref == 'refactor/semantic-css-maintenance'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Apply transformation
        run: python scripts/temporary_semantic_refactor.py

      - name: Regenerate static HTML
        run: python scripts/prerender.py

      - name: Validate result
        run: |
          python -m py_compile scripts/prerender.py
          python -m py_compile scripts/validate_static.py
          python scripts/prerender.py --check
          python scripts/validate_static.py
          node --check app.js
          node --check ads.js

      - name: Commit validated changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html styles.css hero-profile.css hero-heading.css scripts/prerender.py scripts/validate_static.py
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "refactor: mejorar semántica y aislar estilos"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
