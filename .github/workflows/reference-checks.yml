name: Reference checks

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  reference-checks:
    name: reference-checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate Python
        run: |
          python -m py_compile scripts/prerender.py
          python -m py_compile scripts/validate_static.py

      - name: Validate JavaScript
        shell: bash
        run: |
          node --check app.js
          node --check ads.js
          node --check ad-brand-logos.v1.js
          node --check youtube-feed.v1.js
          node --check store/app.js
          while IFS= read -r -d '' file; do
            node --check "$file"
          done < <(find functions -type f -name '*.js' -print0)

      - name: Validate JSON documents
        shell: bash
        run: |
          for file in data/*.json store/data/*.json _routes.json; do
            python -m json.tool "$file" > /dev/null
          done

      - name: Validate store references
        shell: bash
        run: |
          test -f store/index.html
          test -f store/styles.css
          test -f store/app.js
          grep -q 'data/products.json' store/app.js
          grep -q 'data/config.json' store/app.js
          grep -q 'href="store/"' ad-brand-logos.v1.js

      - name: Verify generated HTML
        run: python scripts/prerender.py --check

      - name: Validate static publication
        run: python scripts/validate_static.py
